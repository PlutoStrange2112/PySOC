services:
  azurite:
    image: mcr.microsoft.com/azure-storage/azurite:latest
    container_name: pysoc-azurite
    ports:
      - "10000:10000"  # Blob
      - "10001:10001"  # Queue
      - "10002:10002"  # Table
    command: azurite --blobHost 0.0.0.0 --queueHost 0.0.0.0 --tableHost 0.0.0.0
    healthcheck:
      test: ["CMD", "node", "-e", "const n=require('net');const c=n.createConnection({port:10000,host:'localhost'});c.on('connect',()=>{c.destroy();process.exit(0)});c.on('error',()=>process.exit(1))"]
      interval: 5s
      timeout: 3s
      retries: 10

  mock-sentinel:
    build:
      context: ..
      dockerfile: docker/Dockerfile.mock-sentinel
    container_name: pysoc-mock-sentinel
    ports:
      - "8080:8080"
    environment:
      - FLASK_ENV=development
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health', timeout=3)"]
      interval: 5s
      timeout: 3s
      retries: 10

  functions:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: pysoc-functions
    ports:
      - "7071:80"
    env_file:
      - mock_env/.env.local
    environment:
      - "AzureWebJobsStorage=DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==;BlobEndpoint=http://azurite:10000/devstoreaccount1;QueueEndpoint=http://azurite:10001/devstoreaccount1;TableEndpoint=http://azurite:10002/devstoreaccount1;"
    depends_on:
      azurite:
        condition: service_healthy
      mock-sentinel:
        condition: service_healthy

  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    container_name: pysoc-frontend
    ports:
      - "3000:80"
    depends_on:
      - functions
